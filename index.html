
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Logika Brand Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <h1>Logika Brand Store</h1>
    <div class="header-controls">
        <div class="balance-wrapper">
            <i class="fas fa-coins"></i>
            <span id="userBalance">0</span> <small>Logiks</small>
        </div>
        
        <button id="loginBtn" class="login-btn">Увійти</button>

        <div class="cart-wrapper" id="cartBtn">
            <i class="fas fa-shopping-basket cart-icon"></i>
            <span class="cart-badge" id="cartCount">0</span>
        </div>
    </div>
</header>
<div class="search-container">
  <div class="search-bar">
    <input type="text" id="searchInput" class="search-input" placeholder="Пошук товару..." />
    <div class="search-icon">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        height="24"
        viewBox="0 0 24 24"
        width="24"
      >
        <path d="M0 0h24v24H0z" fill="none"></path>
        <path
          d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM9.5 14C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
        ></path>
      </svg>
    </div>
  </div>
  <div class="glow"></div>
</div>
<div class="filter-container">
<select id="priceFilter">
<option value="default">Сортувати</option>
<option value="cheap">Від дешевого до дорогого</option>
<option value="expensive">Від дорогого до дешевого</option>
</select>
</div>
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close-login">&times;</span>
        <h2>Вхід до Logika</h2>
        <input type="text" id="username" placeholder="Ваш логін">
        <input type="password" id="password" placeholder="Ваш пароль">
        <button id="submitLogin">Увійти в аккаунт</button>
    </div>
</div>
<div id="cartModal" class="modal">
    <div class="modal-content cart-content">
        <span class="close-cart">&times;</span>
        <h2>Ваш кошик</h2>
        <div id="cartItemsList">
            </div>
        <hr>
        <div class="cart-total">
            <strong>Разом: <span id="cartTotal">0</span> Logiks</strong>
        </div>
        <button id="checkoutBtn" class="checkout-btn">Оформити замовлення</button>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close-order">&times;</span>
        <h2>Оформлення замовлення</h2>
        <p>Введіть ваші дані для отримання мерчу:</p>
        <input type="text" id="lastName" placeholder="Прізвище">
        <input type="text" id="firstName" placeholder="Ім'я">
        <button id="confirmOrder">Готово</button>
    </div>
</div>
<section class="products" id="products"></section>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init();</script>
<script src="script.js"></script>
</body>
</html>
